########################################################################
# SARndbox.cfg
#
# Fichero de configuración de la aplicación ARSandbox (Vrui).
#
# Ubicación final: ~/.config/Vrui-8.0/Applications/SARndbox.cfg
#
# Este fichero ajusta el comportamiento general de Vrui (pantalla
# completa, salvapantallas, ratón) y los parámetros de la simulación
# de lluvia/agua del SARndbox.
########################################################################

section Vrui
    section Desktop
        # Evita que la pantalla se quede en blanco si no se pulsan teclas
        inhibitScreenSaver true
    endsection

    section MouseAdapter
        # Oculta el raton tras 5 s inactivo
        mouseIdleTimeout 5.0
    endsection

    section Window
        # Force the application's window to full-screen mode:
        windowFullscreen true
    endsection

    section Tools
        section DefaultTools
            # 1 - Llueve y 2 - Drena
            section WaterTool
                toolClass GlobalWaterTool
                bindings ((Mouse, 1, 2))
            endsection
        endsection
    endsection
endsection

section SARndbox
    # Intensidad de la lluvia
    rainStrength 0.7

    # Velocidad del agua
    waterSpeed 1.2

    # Velocidad de evaporacion
    evaporationRate 0.003
endsection
